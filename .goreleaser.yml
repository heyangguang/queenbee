version: 2

project_name: queenbee

before:
  hooks:
    - go mod tidy

builds:
  - id: queenbee
    main: .
    binary: queenbee
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: freebsd
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - templates/**/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "📦 Other"
      order: 999

release:
  github:
    owner: heyangguang
    name: queenbee
  name_template: "v{{.Version}}"
  header: |
    ## 🐝 QueenBee v{{.Version}}

    消息队列驱动的多 AI Agent 协作引擎。

    ### 📦 平台支持

    | 平台 | 架构 | 文件 |
    |:-----|:-----|:-----|
    | macOS | Apple Silicon (ARM64) | `queenbee_{{.Version}}_darwin_arm64.tar.gz` |
    | macOS | Intel (x86_64) | `queenbee_{{.Version}}_darwin_amd64.tar.gz` |
    | Linux | x86_64 | `queenbee_{{.Version}}_linux_amd64.tar.gz` |
    | Linux | ARM64 | `queenbee_{{.Version}}_linux_arm64.tar.gz` |
    | Linux | x86 (32-bit) | `queenbee_{{.Version}}_linux_386.tar.gz` |
    | Windows | x86_64 | `queenbee_{{.Version}}_windows_amd64.zip` |
    | Windows | ARM64 | `queenbee_{{.Version}}_windows_arm64.zip` |
    | Windows | x86 (32-bit) | `queenbee_{{.Version}}_windows_386.zip` |
    | FreeBSD | x86_64 | `queenbee_{{.Version}}_freebsd_amd64.tar.gz` |
    | FreeBSD | x86 (32-bit) | `queenbee_{{.Version}}_freebsd_386.tar.gz` |

    ### 📥 快速安装

    **macOS / Linux**
    ```bash
    # Apple Silicon
    curl -Lo queenbee.tar.gz https://github.com/heyangguang/queenbee/releases/download/v{{.Version}}/queenbee_{{.Version}}_darwin_arm64.tar.gz
    tar xzf queenbee.tar.gz && sudo mv queenbee /usr/local/bin/
    ```

    **Windows (PowerShell)**
    ```powershell
    Invoke-WebRequest -Uri "https://github.com/heyangguang/queenbee/releases/download/v{{.Version}}/queenbee_{{.Version}}_windows_amd64.zip" -OutFile queenbee.zip
    Expand-Archive queenbee.zip -DestinationPath C:\queenbee
    # 将 C:\queenbee 添加到 PATH
    ```
  footer: |
    **Full Changelog**: https://github.com/heyangguang/queenbee/compare/{{ .PreviousTag }}...{{ .Tag }}
